name: Build MSIX/AppX Package

# يعمل تلقائياً عند الدفع إلى main، أو يدوياً من تبويب Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build AppX package
        run: npx electron-builder --win appx --publish never

      - name: Upload AppX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Deltapos-AppX-Package
          path: dist/*.appx
          if-no-files-found: error
